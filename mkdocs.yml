site_name: 我的文档
theme:
  name: material
  custom_dir: overrides
  palette: 
    - scheme: default
      toggle:
        icon: material/lightbulb
        name: 关灯
      primary: cyan
      accent: cyan

    # 深色主题
    - scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: 开灯
      primary: indigo
      accent: indigo
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
extra_css:
  - assets/stylesheets/extra.css
extra:
  generator: true
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/ra1nma1n
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 学习笔记:
    - notes/index.md
    - linux文件与权限: notes/09-Sep-22.md